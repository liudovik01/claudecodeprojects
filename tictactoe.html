<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.2rem;
      height: 1.8rem;
      color: #a8dadc;
      font-weight: 600;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      border: 2px solid #0f3460;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.6s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #scores {
      display: flex;
      gap: 2rem;
      margin: 1.5rem 0;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border-radius: 10px;
      padding: 0.6rem 1.4rem;
      border: 2px solid #0f3460;
      min-width: 80px;
    }

    .score-box .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.7;
      margin-bottom: 4px;
    }

    .score-box .value {
      font-size: 1.8rem;
      font-weight: 800;
    }

    .score-box.x-score .value { color: #e94560; }
    .score-box.o-score .value { color: #a8dadc; }
    .score-box.tie-score .value { color: #888; }

    #mode-toggle {
      margin-bottom: 1rem;
      display: flex;
      gap: 0.5rem;
    }

    button {
      padding: 0.5rem 1.2rem;
      border: 2px solid #0f3460;
      border-radius: 8px;
      background: #16213e;
      color: #eee;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover { background: #0f3460; border-color: #e94560; }
    button.active { background: #0f3460; border-color: #e94560; color: #e94560; font-weight: 700; }

    #reset {
      margin-top: 1.2rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border-color: #e94560;
      color: #e94560;
    }

    #reset:hover { background: #e94560; color: #fff; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="mode-toggle">
    <button id="btn-2p" class="active" onclick="setMode('2p')">2 Players</button>
    <button id="btn-ai" onclick="setMode('ai')">vs Computer</button>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" onclick="handleClick(0)"></div>
    <div class="cell" onclick="handleClick(1)"></div>
    <div class="cell" onclick="handleClick(2)"></div>
    <div class="cell" onclick="handleClick(3)"></div>
    <div class="cell" onclick="handleClick(4)"></div>
    <div class="cell" onclick="handleClick(5)"></div>
    <div class="cell" onclick="handleClick(6)"></div>
    <div class="cell" onclick="handleClick(7)"></div>
    <div class="cell" onclick="handleClick(8)"></div>
  </div>

  <div id="scores">
    <div class="score-box x-score"><div class="label">X Wins</div><div class="value" id="score-x">0</div></div>
    <div class="score-box tie-score"><div class="label">Ties</div><div class="value" id="score-tie">0</div></div>
    <div class="score-box o-score"><div class="label">O Wins</div><div class="value" id="score-o">0</div></div>
  </div>

  <button id="reset" onclick="resetGame()">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    let board, current, gameOver, mode, scores;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      scores = scores || { X: 0, O: 0, T: 0 };
      mode = mode || '2p';
      render();
    }

    function setMode(m) {
      mode = m;
      document.getElementById('btn-2p').classList.toggle('active', m === '2p');
      document.getElementById('btn-ai').classList.toggle('active', m === 'ai');
      resetGame();
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (mode === 'ai' && current === 'O') return;
      makeMove(i);
      if (mode === 'ai' && !gameOver) {
        setTimeout(aiMove, 350);
      }
    }

    function makeMove(i) {
      board[i] = current;
      const winner = checkWinner();
      if (winner) {
        scores[winner]++;
        gameOver = true;
        render(winner);
        return;
      }
      if (board.every(Boolean)) {
        scores.T++;
        gameOver = true;
        render(null, true);
        return;
      }
      current = current === 'X' ? 'O' : 'X';
      render();
    }

    function aiMove() {
      const best = minimax(board.slice(), 'O');
      makeMove(best.index);
    }

    function minimax(b, player, depth = 0) {
      const w = checkWinnerBoard(b);
      if (w === 'O') return { score: 10 - depth };
      if (w === 'X') return { score: depth - 10 };
      const empty = b.map((v,i) => v ? null : i).filter(i => i !== null);
      if (!empty.length) return { score: 0 };
      const results = empty.map(i => {
        b[i] = player;
        const res = minimax(b, player === 'O' ? 'X' : 'O', depth + 1);
        b[i] = null;
        return { index: i, score: res.score };
      });
      return results.reduce((best, r) =>
        player === 'O' ? (r.score > best.score ? r : best)
                       : (r.score < best.score ? r : best)
      );
    }

    function checkWinner() { return checkWinnerBoard(board); }

    function checkWinnerBoard(b) {
      for (const [a,c,d] of WINS) {
        if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
      }
      return null;
    }

    function render(winner, tie) {
      const cells = document.querySelectorAll('.cell');
      cells.forEach((cell, i) => {
        cell.textContent = board[i] || '';
        cell.className = 'cell' + (board[i] ? ` ${board[i].toLowerCase()} taken` : '');
      });

      if (winner) {
        for (const combo of WINS) {
          const [a,b,c] = combo;
          if (board[a] === winner && board[b] === winner && board[c] === winner) {
            [a,b,c].forEach(i => cells[i].classList.add('win'));
          }
        }
        document.getElementById('status').textContent = `Player ${winner} wins!`;
      } else if (tie) {
        document.getElementById('status').textContent = "It's a tie!";
      } else {
        const label = mode === 'ai' && current === 'O' ? 'Computer (O)' : `Player ${current}`;
        document.getElementById('status').textContent = `${label}'s turn`;
      }

      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-tie').textContent = scores.T;
    }

    function resetGame() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      render();
    }

    init();
  </script>
</body>
</html>
